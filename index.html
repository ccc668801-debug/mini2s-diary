<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diary</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=400;700&family=Lexend:wght=600;800&display=swap');
        
        * {
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            border-radius: 16px;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        body {
            background-color: #f5f6fa;
            color: #2f3542;
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 20px 90px 20px;
        }

        h1, h3 { color: #2f3542; text-align: center; margin-bottom: 20px; font-weight: 700; letter-spacing: 0.5px; }

        .date-selector-box {
            background: #ffffff; border: 1px solid #e4e7eb; padding: 10px; margin-bottom: 15px; text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .date-picker-input {
            width: auto; display: inline-block; padding: 5px 10px; margin-left: 5px;
            border: 2px solid #2f3542; background: #fff; font-weight: bold; color: #2f3542; font-size: 14px; outline: none;
        }

        .card {
            background: #ffffff; padding: 20px; margin-bottom: 15px;
            box-shadow: 0 6px 18px rgba(164, 176, 190, 0.15); border: 1px solid #f1f2f6;
        }

        label { display: block; font-size: 13px; font-weight: bold; color: #747d8c; margin-top: 10px; margin-bottom: 4px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 8px; border: 2px solid #f1f2f6; background: #fdfdfd; font-size: 14px; }
        input:focus, select:focus { outline: none; border-color: #2f3542; background: #fff; }

        button {
            width: 100%; padding: 12px; background: #2f3542; color: white; font-weight: bold; font-size: 15px; border: none; cursor: pointer;
            box-shadow: 0 4px 10px rgba(47, 53, 66, 0.2);
        }
        button:hover { background: #57606f; }

        .upload-options-group { display: flex; gap: 10px; margin-bottom: 12px; }
        .upload-opt-btn {
            flex: 1; padding: 12px 5px; font-size: 13px; text-align: center; font-weight: bold; cursor: pointer;
            border: 2px solid #f1f2f6; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
        }
        .upload-opt-btn:active { background: #f1f2f6; border-color: #2f3542; }

        /* 發布頁與純觀看頁共用的「黃金比例四宮格牆」 */
        .quad-grid-stage {
            position: relative; width: 100%; height: 500px; background: #121212; overflow: hidden; border-radius: 16px; margin-bottom: 15px;
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 2px;
        }
        .grid-cell { position: relative; width: 100%; height: 100%; background: #1a1a1a; overflow: hidden; }
        .grid-cell-video { width: 100%; height: 100%; object-fit: cover; }
        
        /* 四宮格內部的浮動高質感文字排版 */
        .cell-overlay-time-box {
            position: absolute; top: 30px; left: 0; width: 100%; text-align: center; color: #ffffff; text-shadow: 0 2px 6px rgba(0,0,0,0.7); z-index: 10; pointer-events: none;
        }
        .cell-time-title { font-family: 'Lexend', sans-serif; font-size: 20px; font-weight: 800; margin: 0; }
        .cell-desc-title { font-size: 14px; font-weight: 700; margin-top: 1px; padding: 0 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .cell-profile-badge {
            position: absolute; top: 8px; left: 8px; display: flex; align-items: center; gap: 4px;
            background: rgba(0, 0, 0, 0.4); padding: 3px 6px; border-radius: 20px; color: white; z-index: 11; pointer-events: none;
        }
        .cell-badge-avatar { width: 16px; height: 16px; border-radius: 50%; object-fit: cover; }
        .cell-badge-name { font-size: 10px; font-weight: 700; }

        .cell-empty-placeholder {
            width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(255,255,255,0.2); gap: 4px;
        }
        .cell-empty-time { font-family: 'Lexend', sans-serif; font-size: 18px; font-weight: 800; }

        /* 調整平移的工作面板 */
        #tweakControlPanel { display: none; background: #2f3542; padding: 15px; margin-top: 10px; border-radius: 12px; }
        .range-control-group { background: rgba(255,255,255,0.1); padding: 8px; border-radius: 8px; margin-bottom: 8px; }
        .range-slider { width: 100%; margin: 4px 0; accent-color: #ff7675; }

        /* 主導覽列提升為四個分頁 */
        .navbar {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: 65px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #f1f2f6; border-radius: 20px 20px 0 0; z-index: 999;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #a4b0be; cursor: pointer; font-size: 11px; font-weight: bold; width: 23%; }
        .nav-item.active { color: #2f3542; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #canvasStage { display: none; width: 100%; max-width: 320px; margin: 15px auto; background: #000; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <h1>Diary</h1>
    <div id="connStatus" style="text-align:center; font-size:12px; color:#2ed573; font-weight:bold; margin-bottom:10px;">🟢 已連線</div>

    <div class="date-selector-box">
        <label>📅 日記日期：</label>
        <input type="date" id="diaryDate" class="date-picker-input" onchange="handleDateChange()">
    </div>

    <div id="page1" class="tab-content active">
        <div class="card">
            <h3>🔑 個人與自定義地區</h3>
            <label>名字：</label>
            <input type="text" id="userName" value="" placeholder="請輸入名字" onchange="saveProfileAndJoin(); updateLivePublishGrid();">

            <label>大頭貼：</label>
            <div class="avatar-uploader">
                <div style="width:70px; height:70px; border-radius:50%; border:2px dashed #2f3542; background:#f1f2f6; display:flex; align-items:center; justify-content:center; overflow:hidden; cursor:pointer;" onclick="document.getElementById('avatarFileInput').click()">
                    <img id="avatarImage" style="width:100%; height:100%; object-fit:cover;" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23a4b0be'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z'/></svg>">
                </div>
                <input type="file" id="avatarFileInput" accept="image/*" style="display: none;" onchange="handleAvatarFile(this)">
            </div>

            <label>📍 目前所在地區：</label>
            <input type="text" id="userRegion" value="🇹🇼 台灣" placeholder="可自由修改地區或 Emoji" onchange="saveProfileAndJoin(); updateLivePublishGrid();">

            <label>房間代碼：</label>
            <input type="text" id="roomCode" value="ABC99" onchange="saveProfileAndJoin()">
            <button onclick="switchTab(1)">進入世界日記空間 ➔</button>
        </div>
    </div>

    <div id="page2" class="tab-content">
        <div class="card">
            <h3>🕒 當地時段發布</h3>
            <label>當地時間：</label>
            <select id="currentHour" onchange="syncInputText(); updateLivePublishGrid();">
                <script>
                    for(let i=0; i<24; i++) {
                        let h = (i<10?'0':'')+i+':00';
                        document.write(`<option value="${h}" ${i===10?'selected':''}>${h}</option>`);
                    }
                </script>
            </select>
            
            <label>當下在幹嘛（狀態文字）：</label>
            <input type="text" id="statusText" placeholder="" oninput="updateLivePublishGrid()">
            
            <label>添加影片：</label>
            <div class="upload-options-group">
                <div class="upload-opt-btn" onclick="document.getElementById('cameraVideoInput').click()">📸 相機拍攝</div>
                <div class="upload-opt-btn" onclick="document.getElementById('fileVideoInput').click()">📁 手機相簿</div>
            </div>
            <input type="file" id="cameraVideoInput" accept="video/*" capture="camera" style="display: none;" onchange="prepareVideoEditor(this)">
            <input type="file" id="fileVideoInput" accept="video/*" style="display: none;" onchange="prepareVideoEditor(this)">

            <label>🎬 發布對齊預覽牆：</label>
            <div class="quad-grid-stage" id="publishQuadGrid">
                </div>
            
            <div id="tweakControlPanel">
                <div class="range-control-group">
                    <label style="color:#fff; font-size:11px;">⏱️ 2秒精采起點: <span id="timeVal">0.0s</span></label>
                    <input type="range" id="timeOffsetSlider" class="range-slider" min="0" max="10" step="0.1" value="0" oninput="updateVideoCropPreview()">
                </div>
                <div class="range-control-group">
                    <label style="color:#fff; font-size:11px;">↕️ 畫面上下移動置中: <span id="yVal">50%</span></label>
                    <input type="range" id="vOffsetSlider" class="range-slider" min="0" max="100" value="50" oninput="updateVideoCropPreview()">
                </div>
            </div>

            <button id="uploadBtn" onclick="submitDiaryToServer()" style="margin-top: 15px;">🚀 發布日常動態</button>
            <p id="timerStatus" style="color: #2ed573; font-weight: bold; text-align: center; margin-top: 8px; font-size: 13px;"></p>
        </div>
    </div>

    <div id="page3" class="tab-content">
        <div class="card">
            <h3>👀 看看此特定時段大家在幹嘛</h3>
            <label>選擇觀看時段：</label>
            <select id="watchHourSelect" onchange="refreshWatchGridUI()">
                <script>
                    for(let i=0; i<24; i++) {
                        let h = (i<10?'0':'')+i+':00';
                        document.write(`<option value="${h}" ${i===10?'selected':''}>${h}</option>`);
                    }
                </script>
            </select>

            <div class="quad-grid-stage" id="watchQuadGrid">
                </div>
        </div>
    </div>

    <div id="page4" class="tab-content">
        <div class="card">
            <h3>🍿 全天 24 小時 • 終極串聯縮時大片</h3>
            <p style="font-size: 13px; color: #747d8c; text-align: center; margin-bottom: 20px;">此功能會把今天所有有紀錄的時段自動完美合成，串接成一支連續不間斷的 24h 精采紀錄大片。</p>
            <button onclick="renderMegaFullDayVideo()" style="background: #2ed573; color: white; padding: 15px; font-size: 16px;">🎬 一鍵生成 24H 終極大片</button>
            <div id="megaOutputArea" style="margin-top: 20px; text-align: center;"></div>
        </div>
        <canvas id="canvasStage" width="540" height="960"></canvas>
    </div>

    <div class="navbar">
        <div class="nav-item active" id="nav1" onclick="switchTab(0)">🔑 設定</div>
        <div class="nav-item" id="nav2" onclick="switchTab(1)">🕒 發布日常</div>
        <div class="nav-item" id="nav3" onclick="switchTab(2)">👀 看看大家</div>
        <div class="nav-item" id="nav4" onclick="switchTab(3)">🎬 影片生成</div>
    </div>

    <script>
        let socket; let userAvatarBase64 = ""; let currentRawVideoSrc = ""; let megaDB = {};
        const fullDayHours = []; for(let i=0; i<24; i++) { fullDayHours.push((i < 10 ? '0' + i : i) + ':00'); }

        window.onload = function() {
            const today = new Date();
            document.getElementById('diaryDate').value = today.toISOString().split('T')[0];

            socket = io();
            socket.on('connect', () => { saveProfileAndJoin(); });

            socket.on('new-diary-broadcast', (data) => {
                const d = data.date; const h = data.hour; const u = data.userName;
                if (!megaDB[d]) megaDB[d] = initDateHours();
                if (!megaDB[d][h]) megaDB[d][h] = {};

                megaDB[d][h][u] = {
                    text: data.text, avatar: data.avatar, video: data.video,
                    timeStart: data.timeStart || 0, yAlign: data.yAlign || 50, region: data.region || "🇹🇼 台灣"
                };
                localStorage.setItem("mini2s_megaDB", JSON.stringify(megaDB));
                
                const activeTabId = document.querySelector('.nav-item.active').id;
                if (activeTabId === "nav2") updateLivePublishGrid();
                if (activeTabId === "nav3") refreshWatchGridUI();
            });

            if(localStorage.getItem("mini2s_userName")) document.getElementById("userName").value = localStorage.getItem("mini2s_userName");
            if(localStorage.getItem("mini2s_roomCode")) document.getElementById("roomCode").value = localStorage.getItem("mini2s_roomCode");
            if(localStorage.getItem("mini2s_userRegion")) document.getElementById("userRegion").value = localStorage.getItem("mini2s_userRegion");
            if(localStorage.getItem("mini2s_customAvatar")) {
                userAvatarBase64 = localStorage.getItem("mini2s_customAvatar");
                document.getElementById("avatarImage").src = userAvatarBase64;
            }
            megaDB = localStorage.getItem("mini2s_megaDB") ? JSON.parse(localStorage.getItem("mini2s_megaDB")) : {};
            
            // 初始化發布頁面四宮格的空白格子
            updateLivePublishGrid();
            syncInputText();
        };

        function initDateHours() { let obj = {}; fullDayHours.forEach(h => obj[h] = {}); return obj; }

        function handleAvatarFile(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                userAvatarBase64 = e.target.result;
                document.getElementById("avatarImage").src = userAvatarBase64;
                localStorage.setItem("mini2s_customAvatar", userAvatarBase64);
                updateLivePublishGrid();
            };
            reader.readAsDataURL(file);
        }

        function getActiveDateDB() { const date = document.getElementById('diaryDate').value; if(!megaDB[date]) megaDB[date] = initDateHours(); return megaDB[date]; }
        
        // 算出固定順序的前 4 個人
        function GetRoomUserList(hour) {
            const dateDB = getActiveDateDB();
            const myName = document.getElementById("userName").value || "未命名";
            const userSet = new Set([myName]);
            if(dateDB[hour]) { Object.keys(dateDB[hour]).forEach(u => userSet.add(u)); }
            return Array.from(userSet).slice(0, 4);
        }

        // 核心更新：發布頁面的即時四宮格渲染
        function updateLivePublishGrid() {
            const gridContainer = document.getElementById("publishQuadGrid");
            if(!gridContainer) return;
            gridContainer.innerHTML = "";

            const hour = document.getElementById("currentHour").value;
            const text = document.getElementById("statusText").value || "";
            const myName = document.getElementById("userName").value || "未命名";
            const reg = document.getElementById("userRegion").value || "🇹🇼 台灣";
            const dateDB = getActiveDateDB();

            const userList = GetRoomUserList(hour);
            const mySlotIndex = userList.indexOf(myName);

            for(let i=0; i<4; i++) {
                const user = userList[i];
                const cell = document.createElement("div");
                cell.className = "grid-cell";

                // 如果是「我自己」的格子
                if(user === myName) {
                    if(currentRawVideoSrc) {
                        cell.innerHTML = `
                            <div class="cell-overlay-time-box">
                                <div class="cell-time-title">${hour}</div>
                                <div class="cell-desc-title">${text}</div>
                            </div>
                            <div class="cell-profile-badge">
                                <img class="cell-badge-avatar" src="${userAvatarBase64 || 'data:image/svg+xml;utf8,<svg viewBox=\'0 0 24 24\' fill=\'%23a4b0be\'><path d=\'M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z\'/></svg>'}">
                                <span class="cell-badge-name">${myName} ${reg}</span>
                            </div>
                            <video class="grid-cell-video" id="liveEditVideoRef" loop muted playsinline src="${currentRawVideoSrc}"></video>
                        `;
                    } else {
                        cell.innerHTML = `
                            <div class="cell-empty-placeholder">
                                <div class="cell-empty-time">${hour}</div>
                                <span style="font-size:11px; font-weight:bold;">👉 點上方添加影片</span>
                            </div>
                        `;
                    }
                } else if(user && dateDB[hour] && dateDB[hour][user] && dateDB[hour][user].text) {
                    // 其他已經上傳的朋友格子
                    const uData = dateDB[hour][user];
                    cell.innerHTML = `
                        <div class="cell-overlay-time-box">
                            <div class="cell-time-title">${hour}</div>
                            <div class="cell-desc-title">${uData.text}</div>
                        </div>
                        <div class="cell-profile-badge">
                            <img class="cell-badge-avatar" src="${uData.avatar || 'data:image/svg+xml;utf8,<svg viewBox=\'0 0 24 24\' fill=\'%23a4b0be\'><path d=\'M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z\'/></svg>'}">
                            <span class="cell-badge-name">${user} ${uData.region || "🇹🇼 台灣"}</span>
                        </div>
                        <video class="grid-cell-video" loop autoplay muted playsinline src="${uData.video}" style="object-position: center ${uData.yAlign}%;"></video>
                    `;
                } else {
                    // 閒置無人上傳的空格子
                    cell.innerHTML = `
                        <div class="cell-empty-placeholder">
                            <div class="cell-empty-time">${hour}</div>
                            <span>💤</span>
                        </div>
                    `;
                }
                gridContainer.appendChild(cell);
            }

            // 如果有加載影片，保持微調滑桿的位置對齊
            if(currentRawVideoSrc) {
                const editVid = document.getElementById("liveEditVideoRef");
                if(editVid) {
                    editVid.onloadedmetadata = function() {
                        editVid.play();
                        updateVideoCropPreview();
                    }
                }
            }
        }

        function prepareVideoEditor(input) {
            const file = input.files[0]; if (!file) return;
            document.getElementById('timerStatus').innerText = "⏳ 載入影片中...";
            const reader = new FileReader();
            reader.onload = function(e) {
                currentRawVideoSrc = e.target.result;
                document.getElementById("tweakControlPanel").style.display = "block";
                document.getElementById("timeOffsetSlider").value = 0;
                document.getElementById("vOffsetSlider").value = 50;
                document.getElementById('timerStatus').innerText = "✨ 請調整精采起點與畫面中心！";
                
                updateLivePublishGrid();
            };
            reader.readAsDataURL(file);
        }

        function updateVideoCropPreview() {
            const videoEl = document.getElementById("liveEditVideoRef");
            if(!videoEl) return;
            const timeStart = parseFloat(document.getElementById("timeOffsetSlider").value);
            const yAlign = document.getElementById("vOffsetSlider").value;
            document.getElementById("timeVal").innerText = timeStart.toFixed(1) + "s";
            document.getElementById("yVal").innerText = yAlign + "%";
            
            if(videoEl.duration) { document.getElementById("timeOffsetSlider").max = Math.max(0, videoEl.duration - 2); }
            videoEl.currentTime = timeStart;
            videoEl.style.objectPosition = `center ${yAlign}%`;
        }

        function submitDiaryToServer() {
            const textInput = document.getElementById('statusText').value;
            if(!textInput || !currentRawVideoSrc) return alert("請填寫狀態並選擇影片唷！🎬");

            const date = document.getElementById('diaryDate').value;
            const hour = document.getElementById('currentHour').value;
            const uName = document.getElementById("userName").value || "未命名";
            const rCode = document.getElementById("roomCode").value;
            const reg = document.getElementById("userRegion").value;
            const dateDB = getActiveDateDB();

            dateDB[hour][uName] = {
                text: textInput, avatar: userAvatarBase64, video: currentRawVideoSrc,
                timeStart: parseFloat(document.getElementById("timeOffsetSlider").value),
                yAlign: parseInt(document.getElementById("vOffsetSlider").value),
                region: reg
            };
            localStorage.setItem("mini2s_megaDB", JSON.stringify(megaDB));

            if(socket && socket.connected) {
                socket.emit('share-diary', {
                    roomCode: rCode, userName: uName, date: date, hour: hour,
                    text: textInput, avatar: userAvatarBase64, video: currentRawVideoSrc,
                    timeStart: dateDB[hour][uName].timeStart, yAlign: dateDB[hour][uName].yAlign, region: reg
                });
            }

            // ✨ 發布完成跳出對話框，點選後徹底重置清空
            alert("🎉 新增完成！");
            clearPublishPage();
        }

        function clearPublishPage() {
            document.getElementById('statusText').value = "";
            document.getElementById("tweakControlPanel").style.display = "none";
            document.getElementById('timerStatus').innerText = "";
            document.getElementById('cameraVideoInput').value = "";
            document.getElementById('fileVideoInput').value = "";
            currentRawVideoSrc = "";
            updateLivePublishGrid();
        }

        // 觀看頁面分頁的下拉四宮格刷新
        function refreshWatchGridUI() {
            const gridContainer = document.getElementById("watchQuadGrid");
            if(!gridContainer) return;
            gridContainer.innerHTML = "";

            const hour = document.getElementById("watchHourSelect").value;
            const dateDB = getActiveDateDB();
            const userList = GetRoomUserList(hour);

            for(let i=0; i<4; i++) {
                const user = userList[i];
                const cell = document.createElement("div");
                cell.className = "grid-cell";

                if(user && dateDB[hour] && dateDB[hour][user] && dateDB[hour][user].text) {
                    const uData = dateDB[hour][user];
                    cell.innerHTML = `
                        <div class="cell-overlay-time-box">
                            <div class="cell-time-title">${hour}</div>
                            <div class="cell-desc-title">${uData.text}</div>
                        </div>
                        <div class="cell-profile-badge">
                            <img class="cell-badge-avatar" src="${uData.avatar || 'data:image/svg+xml;utf8,<svg viewBox=\'0 0 24 24\' fill=\'%23a4b0be\'><path d=\'M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z\'/></svg>'}">
                            <span class="cell-badge-name">${user} ${uData.region || "🇹🇼 台灣"}</span>
                        </div>
                        <video class="grid-cell-video" loop autoplay muted playsinline src="${uData.video}" style="object-position: center ${uData.yAlign}%;"></video>
                    `;
                } else {
                    cell.innerHTML = `
                        <div class="cell-empty-placeholder">
                            <div class="cell-empty-time">${hour}</div>
                            <span>💤</span>
                        </div>
                    `;
                }
                gridContainer.appendChild(cell);
            }
        }

        function saveProfileAndJoin() {
            const rCode = document.getElementById("roomCode").value;
            const uName = document.getElementById("userName").value;
            const reg = document.getElementById("userRegion").value;
            localStorage.setItem("mini2s_userName", uName);
            localStorage.setItem("mini2s_roomCode", rCode);
            localStorage.setItem("mini2s_userRegion", reg);
            if(socket && socket.connected) socket.emit('join-room', rCode);
        }

        function handleDateChange() { 
            syncInputText(); 
            const activeTabId = document.querySelector('.nav-item.active').id;
            if (activeTabId === "nav2") updateLivePublishGrid();
            if (activeTabId === "nav3") refreshWatchGridUI();
        }
        
        function syncInputText() { const hour = document.getElementById('currentHour').value; const uName = document.getElementById("userName").value || "未命名"; const dateDB = getActiveDateDB(); document.getElementById('statusText').value = (dateDB[hour] && dateDB[hour][uName]) ? dateDB[hour][uName].text : ""; }

        // 主分頁四大導覽切換
        function switchTab(tabIndex) { 
            document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active')); 
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); 
            document.querySelectorAll('.tab-content')[tabIndex].classList.add('active'); 
            document.querySelectorAll('.nav-item')[tabIndex].classList.add('active'); 
            if(tabIndex === 1) updateLivePublishGrid();
            if(tabIndex === 2) refreshWatchGridUI(); 
        }

        // 唯一專用：高能 24 小時大片生成器
        async function renderMegaFullDayVideo() {
            const canvas = document.getElementById('canvasStage'); const ctx = canvas.getContext('2d');
            const outputArea = document.getElementById('megaOutputArea'); 
            const dateDB = getActiveDateDB();
            const myCurrentName = document.getElementById("userName").value || "未命名";

            // 抓出一整天所有有發布影片的時段
            let activeHours = Object.keys(dateDB).filter(h => Object.keys(dateDB[h]).some(u => dateDB[h][u] && dateDB[h][u].video)).sort();
            
            if(activeHours.length === 0) { 
                outputArea.innerHTML = "<p style='color:#2f3542;font-weight:bold;'>❌ 今天還沒有任何人上傳動態，無法生成 24H 大片唷！</p>"; 
                return; 
            }

            canvas.style.display = 'block';
            outputArea.innerHTML = `<p style='color:#747d8c;'>⏳ 正在將全天時段串聯融合成終極大片，請稍候...</p>`;

            const stream = canvas.captureStream(24);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            let chunks = []; recorder.ondataavailable = (e) => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' }); const url = URL.createObjectURL(blob);
                outputArea.innerHTML = `
                    <p style="color:#2ed573; font-weight:bold;">🎉 24H 終極連線大片生成成功！</p>
                    <video src="${url}" controls autoplay style="width:100%; max-width:320px; border-radius:12px; margin-top:10px;"></video>
                    <a href="${url}" download="Diary_24H_FullDay.mp4" style="color:#2f3542; text-decoration:none; font-weight:bold; display:block; margin-top:8px;">📥 下載全天 24H 影片 MP4</a>`;
            };
            recorder.start();

            // 收集不重複的使用者清單
            const userSet = new Set([myCurrentName]);
            activeHours.forEach(h => Object.keys(dateDB[h]).forEach(u => userSet.add(u)));
            const userList = Array.from(userSet).slice(0, 4);

            const loadedAvatars = {};
            for (let u of userList) {
                let src = "data:image/svg+xml;utf8,<svg viewBox='0 0 24 24' fill='%23a4b0be'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z'/></svg>";
                for (let h of activeHours) { if (dateDB[h] && dateDB[h][u] && dateDB[h][u].avatar) { src = dateDB[h][u].avatar; break; } }
                const img = new Image(); img.src = src; await new Promise(r => img.onload = r); loadedAvatars[u] = img;
            }

            const cellW = canvas.width / 2;
            const cellH = canvas.height / 2;
            const gridCoords = [{ x: 0, y: 0 }, { x: cellW, y: 0 }, { x: 0, y: cellH }, { x: cellW, y: cellH }];

            for (let h of activeHours) {
                const vElements = {};
                for (let u of userList) {
                    if (dateDB[h] && dateDB[h][u] && dateDB[h][u].video) {
                        const v = document.createElement('video'); v.src = dateDB[h][u].video; v.muted = true; v.playsInline = true;
                        v.currentTime = dateDB[h][u].timeStart || 0; v.play(); vElements[u] = v;
                    }
                }

                let startRun = Date.now();
                while (Date.now() - startRun < 2000) { // 每個有影片的時段連續播放 2 秒
                    ctx.fillStyle = '#1e1e1e'; ctx.fillRect(0, 0, canvas.width, canvas.height);

                    for (let i = 0; i < 4; i++) {
                        const u = userList[i]; if (!u) continue;
                        const coord = gridCoords[i];
                        const uData = dateDB[h] ? dateDB[h][u] : null;

                        ctx.save();
                        ctx.beginPath(); ctx.rect(coord.x, coord.y, cellW, cellH); ctx.clip();

                        if (uData && uData.video && vElements[u]) {
                            const video = vElements[u];
                            const yPercent = (uData.yAlign || 50) / 100;
                            
                            ctx.drawImage(video, coord.x - (cellH - cellW)/2, coord.y - (cellH - cellW)*yPercent, cellH, cellH);
                            ctx.fillStyle = "rgba(0, 0, 0, 0.12)"; ctx.fillRect(coord.x, coord.y, cellW, cellH);

                            ctx.fillStyle = "#ffffff"; ctx.textAlign = "center";
                            ctx.shadowColor = "rgba(0,0,0,0.6)"; ctx.shadowBlur = 8;
                            
                            ctx.font = "800 32px 'Lexend', sans-serif";
                            ctx.fillText(h, coord.x + cellW / 2, coord.y + 65);
                            
                            ctx.font = "bold 20px sans-serif";
                            ctx.fillText(uData.text, coord.x + cellW / 2, coord.y + 105);
                            ctx.shadowBlur = 0;

                            const regionDisplay = uData.region || "";
                            const bx = coord.x + 12; const by = coord.y + 12;
                            
                            ctx.fillStyle = "rgba(0, 0, 0, 0.3)";
                            ctx.beginPath(); ctx.roundRect(bx, by, 125, 26, 13); ctx.fill();

                            if (loadedAvatars[u]) {
                                ctx.save();
                                ctx.beginPath(); ctx.arc(bx + 13, by + 13, 9, 0, Math.PI * 2); ctx.clip();
                                ctx.drawImage(loadedAvatars[u], bx + 4, by + 4, 18, 18);
                                ctx.restore();
                            }
                            ctx.fillStyle = "#ffffff"; ctx.textAlign = "left";
                            ctx.font = "bold 11px sans-serif";
                            ctx.fillText(`${u} ${regionDisplay.substring(0,6)}`, bx + 28, by + 17);

                        } else {
                            ctx.fillStyle = '#121212'; ctx.fillRect(coord.x, coord.y, cellW, cellH);
                            ctx.fillStyle = 'rgba(255,255,255,0.2)';
                            ctx.textAlign = "center";
                            ctx.font = "800 30px 'Lexend', sans-serif"; ctx.fillText(h, coord.x + cellW / 2, coord.y + 65);
                            ctx.font = "30px sans-serif"; ctx.fillText("💤", coord.x + cellW / 2, coord.y + 115);
                        }
                        ctx.restore();
                    }
                    await new Promise(r => setTimeout(r, 40));
                }
                for(let u in vElements) { vElements[u].pause(); vElements[u].src=""; vElements[u].load(); }
            }
            recorder.stop();
        }
    </script>
</body>
